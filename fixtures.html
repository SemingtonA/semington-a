<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fixtures & Results</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background-color: #f5f0e6;
    }

    /* ===== HEADER ===== */
    header { padding: 20px; }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      margin: 0;
      font-size: 72px;
      text-align: center;
      flex: 1;
    }

    .logo img { width: 300px; height: auto; }

    .nav-buttons {
      margin-top: 15px;
      text-align: center;
    }

    .nav-buttons a {
      display: inline-block;
      margin: 6px;
      padding: 10px 18px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }

    .nav-buttons a:hover { background: #163aa3; }

    /* ===== LEAGUE RESULTS STRIP ===== */
    .league-results-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .league-label { font-weight: bold; font-size: 30px; }

    .result-boxes { display: flex; gap: 10px; }

    .result-box {
      background: #000;
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 20px;
    }

    .result-box.win   { border: 2px solid #1e8449; }
    .result-box.draw { border: 2px solid #f1c40f; }
    .result-box.loss { border: 2px solid #c0392b; }
    .result-box.total { border: 2px solid #000; }

    /* ===== MAIN ===== */
    .fixtures-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
  gap: 12px;
}

.fixtures-header h2 {
  margin: 0;
}

.last-updated {
  font-size: 12px;
  color: #555;
  white-space: nowrap;
}
    main { flex: 1; padding: 20px; }

    .content-box {
      background: #fff;
      margin: 0 auto;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; font-size: 14px; }
    th { background: #f0f0f0; text-align: left; }
    th.points,
    td.points {
    text-align: center;
    white-space: nowrap;
   }

    col.points {
    text-align: center;
   }

    tr._win td  { background: #e8f8f1; }
    tr._loss td { background: #fdecea; }
    tr._draw td { background: #fff8e1; }
    tr.cup-match td { background: #e6f2ff; }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #555;
    }

    .footer-logo img { width: 60px; }

    @media (max-width: 900px) {
      .header-top { flex-direction: column; text-align: center; }
      header h1 { font-size: 32px; margin-top: 10px; }
      .logo img { width: 150px; }
      th, td { font-size: 12px; }
    }
    @media (max-width: 900px) {
  .fixtures-header {
    flex-direction: column;
    align-items: flex-start;
  }
}
  </style>
</head>

<body>

<header>
  <div class="header-top">
    <h1>Fixtures & Results</h1>
    <div class="logo">
      <img src="Semington A Logo 5.jpg" alt="Semington A Logo">
    </div>
  </div>
  
  <div class="nav-buttons">
    <a href="/semington-a/index.html">Home</a>
    <a href="/semington-a/fixtures.html">Fixtures & Results</a>
    <a href="/semington-a/match-results.html">Match Results</a>
    <a href="/semington-a/tocatch.html">To Catch</a>
    <a href="/semington-a/gallery.html">Gallery</a>
    <a href="/semington-a/rules.html">Rules</a>
  </div>

  <div class="league-results-row">
    <div class="league-label">League Results</div>
    <div class="result-boxes">
      <div class="result-box win">Wins: <span id="winCount">0</span></div>
      <div class="result-box draw">Draws: <span id="drawCount">0</span></div>
      <div class="result-box loss">Losses: <span id="lossCount">0</span></div>
    </div>
    <div class="result-box total">
      Total League Points: <span id="pointsTotal">0</span>
    </div>
  </div>
</header>

<main>
  <div class="content-box">
    <div class="fixtures-header">
  <h2>Fixtures</h2>
  <div id="lastUpdated" class="last-updated">
    Last updated: —
  </div>

   
  <table>

  <colgroup>
    <col>
    <col>
    <col>
    <col>
    <col class="points">
    <col>
    <col>
    <col>
  </colgroup>

  <thead>
    <tr>
      <th>Date</th>
      <th>Day</th>
      <th>Fixture</th>
      <th>Scores</th>
      <th class="points">Points</th>
      <th>Venue</th>
      <th>Competition</th>
      <th>Alley</th>
    </tr>
  </thead>

  <tbody id="fixturesBody">
    <!-- rows injected by JS -->
  </tbody>

</table> 
  </div>
</main>

<footer>
  © Semington A Skittles Team
  <div class="footer-logo">
    <img src="Semington A Logo 5.jpg" alt="Semington A Logo">
  </div>
</footer>

<script>
(function () {

  /* =========================================================
     FIXTURES (TEST) — CSV → TABLE → LIVE-STYLE STATS
     Data source: fixtures_web.csv
     ========================================================= */

  function clean(v) { return (v == null) ? "" : String(v).trim(); }

  // Simple CSV split is OK for your fixtures_web.csv rows (no quoted commas in fields)
  function splitRow(line) { return line.split(","); }

  // Half parser to match live behaviour
  function toHalfNum(s) {
    if (!s) return NaN;
    s = String(s).trim();
    if (!s) return NaN;

    s = s.replace(/\s+/g, "");  // "6 1/2" -> "61/2"
    s = s.replace(/½/g, ".5");  // "½" -> ".5"
    if (s === "1/2") return 0.5;
    s = s.replace(/(\d+)1\/2/g, "$1.5");

    var n = Number(s);
    return Number.isFinite(n) ? n : NaN;
  }

  function parsePoints(text) {
    if (!text) return null;
    var parts = String(text).trim().split(/[-–—]/).map(function (p) { return p.trim(); });
    if (parts.length !== 2) return null;

    var a = toHalfNum(parts[0]);
    var b = toHalfNum(parts[1]);
    if (!Number.isFinite(a) || !Number.isFinite(b)) return null;

    return { left: a, right: b };
  }

  // ---------- DOM ----------
  var tbody = document.getElementById("fixturesBody");
  if (!tbody) return;

  // ---------- FETCH CSV (cache-busted for GitHub Pages) ----------
  fetch("fixtures_web.csv?v=" + Date.now(), { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) throw new Error("fixtures_web.csv not found (" + r.status + ")");
      return r.text();
    })
    .then(function (text) {

      var lines = text.split(/\r?\n/).map(function (l) { return l.trim(); });

      // Find real header row (your file has title/blank rows before it) [1](https://onedrive.live.com/?id=7cbb65b0-5a33-44ef-8292-44bee12a8f9e&cid=c205089414b2510e&web=1)
      var headerLineIndex = -1;
      for (var i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("Date:")) { headerLineIndex = i; break; }
      }
      if (headerLineIndex < 0) throw new Error("Header row not found (Date:)");

      var header = splitRow(lines[headerLineIndex]).map(clean);

      function idx(name) { return header.indexOf(name); }
      var iDate = idx("Date:");
      var iDay = idx("Day");
      var iHome = idx("Home Team");
      var iAway = idx("Away Team");
      var iLoc = idx("Location");
      var iAlley = idx("Alley");
      var iComp = idx("Match Details");
      var iPts1 = idx("Points");
      // second Points is after "vs" column in your file [1](https://onedrive.live.com/?id=7cbb65b0-5a33-44ef-8292-44bee12a8f9e&cid=c205089414b2510e&web=1)
      var iPts2 = iPts1 >= 0 ? iPts1 + 2 : -1;

      // Scores appear twice too (home score at first "Score", away score at second) [1](https://onedrive.live.com/?id=7cbb65b0-5a33-44ef-8292-44bee12a8f9e&cid=c205089414b2510e&web=1)
      var iScore1 = idx("Score");
      var iScore2 = -1;
      if (iScore1 !== -1) {
        // find second "Score"
        for (var s = iScore1 + 1; s < header.length; s++) {
          if (header[s] === "Score") { iScore2 = s; break; }
        }
      }

      // UpdatedAt is last column in your file [1](https://onedrive.live.com/?id=7cbb65b0-5a33-44ef-8292-44bee12a8f9e&cid=c205089414b2510e&web=1)
      var iUpdated = idx("UpdatedAt");

      // ---------- BUILD TABLE ----------
      tbody.innerHTML = "";

      var latestUpdated = "";

      for (var r2 = headerLineIndex + 1; r2 < lines.length; r2++) {
        var line = lines[r2];
        if (!line) continue;

        // Stop before footer summary ("League Matches...") [1](https://onedrive.live.com/?id=7cbb65b0-5a33-44ef-8292-44bee12a8f9e&cid=c205089414b2510e&web=1)
        if (line.toLowerCase().startsWith("league matches")) break;
        if (line.toLowerCase().startsWith("fixtures and scores")) continue;

        var row = splitRow(line).map(clean);
        if (!row[iDate]) continue;

        var dateStr = row[iDate];
        var dayStr = row[iDay] || "";
        var homeTeam = row[iHome] || "";
        var awayTeam = row[iAway] || "";
        var venue = row[iLoc] || "";
        var alley = row[iAlley] || "";
        var comp = row[iComp] || "";

        var p1 = (iPts1 !== -1) ? (row[iPts1] || "") : "";
        var p2 = (iPts2 !== -1) ? (row[iPts2] || "") : "";
        var ptsText = (p1 && p2) ? (p1 + "–" + p2) : ""; // blank => unplayed (white)

        var hs = (iScore1 !== -1) ? (row[iScore1] || "") : "";
        var as = (iScore2 !== -1) ? (row[iScore2] || "") : "";
        var scoreText = (hs && as) ? (hs + "–" + as) : "";

        if (iUpdated !== -1 && row[iUpdated]) latestUpdated = row[iUpdated];

        var tr = document.createElement("tr");
        if (/cup/i.test(comp)) tr.classList.add("cup-match");

        tr.innerHTML =
          "<td>" + dateStr + "</td>" +
          "<td>" + dayStr + "</td>" +
          "<td>" + homeTeam + " vs " + awayTeam + "</td>" +
          "<td>" + scoreText + "</td>" +
          "<td class=\"points\">" + ptsText + "</td>" +
          "<td>" + venue + "</td>" +
          "<td>" + comp + "</td>" +
          "<td>" + alley + "</td>";

        tbody.appendChild(tr);
      }

      // ---------- LIVE-STYLE STATS (AFTER ROWS EXIST) ----------
      var table = document.querySelector("table");
      var ths = Array.from(table.querySelectorAll("thead th")).map(function (th) {
        return th.textContent.trim().toLowerCase();
      });

      var fixtureIdx = ths.indexOf("fixture");
      var pointsIdx  = ths.indexOf("points");
      var compIdx    = ths.indexOf("competition");

      var wins = 0, draws = 0, losses = 0, totalPoints = 0;

      Array.from(table.querySelectorAll("tbody tr")).forEach(function (tr) {
        var tds = Array.from(tr.querySelectorAll("td"));
        if (!tds.length) return;

        var competition = (tds[compIdx] ? tds[compIdx].textContent : "").toLowerCase();
        if (competition.includes("cup")) return; // cup excluded from totals

        var pointsText = (tds[pointsIdx] ? tds[pointsIdx].textContent : "").trim();
        if (!pointsText) return; // unplayed stays white, not counted

        var pair = parsePoints(pointsText);
        if (!pair) return;

        var fixtureText = (tds[fixtureIdx] ? tds[fixtureIdx].textContent : "").trim();
        var parts = fixtureText.split(/\s+vs\s+/i);
        if (parts.length < 2) return;

        var homeTeam = parts[0].trim();
        var awayTeam = parts[1].trim();

        var myPts = NaN;
        if (/semington a/i.test(homeTeam)) myPts = pair.left;
        else if (/semington a/i.test(awayTeam)) myPts = pair.right;
        else return;

        totalPoints += myPts;

        tr.classList.remove("_win","_loss","_draw");

        // ONLY draw is 3.5–3.5
        if (myPts === 3.5) { draws++; tr.classList.add("_draw"); }
        else if (myPts > 3.5) { wins++; tr.classList.add("_win"); }
        else { losses++; tr.classList.add("_loss"); }
      });

      document.getElementById("winCount").textContent = wins;
      document.getElementById("drawCount").textContent = draws;
      document.getElementById("lossCount").textContent = losses;
      document.getElementById("pointsTotal").textContent = totalPoints.toFixed(1);

      // ---------- Last Updated ----------
      if (latestUpdated) {
        var d = parseDMY(latestUpdated);
        if (d) {
          document.getElementById("lastUpdated").textContent =
            "Last updated: " +
            d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
        }
      }

      function parseDMY(dateTime) {
        var dpart = clean(dateTime).split(" ")[0];
        var p = dpart.split("/");
        if (p.length !== 3) return null;
        return new Date(Number(p[2]), Number(p[1]) - 1, Number(p[0]));
      }
    })
    .catch(function (e) {
      console.error(e);
      var lu = document.getElementById("lastUpdated");
      if (lu) lu.textContent = "Last updated: (error loading fixtures)";
    });

})();
</script>

        </body>
        </html>
