<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fixtures & Results</title>

<style>
body{margin:0;min-height:100vh;display:flex;flex-direction:column;font-family:Arial,sans-serif;background:#f5f0e6}

/* Header */
header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:20px}
.header-center{text-align:center}
.header-center h1{margin:0;font-size:48px}
.header-right{text-align:right}
.header-right img{width:300px;height:auto}

/* Nav (black buttons) */
.nav-buttons{margin-top:12px;text-align:center}
.nav-buttons a{display:inline-block;margin:6px;padding:10px 18px;background:#000;color:#fff;text-decoration:none;border-radius:4px;font-weight:bold}
.nav-buttons a:hover{background:#333}

/* Main */
main{flex:1;padding:20px}
.panel{max-width:1400px;margin:10px auto 14px;background:#ffffffcc;border-radius:8px;padding:12px}
#status{margin-top:8px;font-size:12px;color:#555}

/* Table */
.table-wrap{max-width:1400px;margin:0 auto;background:#fff;border-radius:8px;padding:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}

/* Allow header wrap, keep data tidy */
th{border-bottom:1px solid #eee;padding:8px;white-space:normal;line-height:1.2;text-align:center;background:#fafafa}
td{border-bottom:1px solid #eee;padding:8px;white-space:nowrap;text-align:center}

/* Left align Fixture and Venue */
td:nth-child(2),th:nth-child(2),
td:nth-child(4),th:nth-child(4){text-align:left}

/* Footer */
footer{margin-top:auto;text-align:center;padding:16px 20px 22px;font-size:12px;color:#555}
.footer-logo img{width:60px;opacity:.9}
</style>
</head>

<body>

<header>
  <div></div>
  <div class="header-center">
    <h1>Fixtures & Results</h1>
    <div class="nav-buttons">
      <a href="home.html">Home</a>
      <a href="fixtures.html">Fixtures & Results</a>
      <a href="match-results.html">Match Results</a>
      <a href="tocatch.html">To Catch</a>
      <a href="gallery.html">Gallery</a>
      <a href="Rules.html">Rules</a>
    </div>
  </div>
  <div class="header-right">
    <img src="Semington A Logo 5.jpg" alt="Semington A Logo">
  </div>
</header>

<main>

<div class="panel">
  <div id="status"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Day</Th>
        <th>Fixture</th>
        <th>Points</th>
        <th>Venue</th>
        <th>Alley</th>
        <th>Competition</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</main>

<footer>
  © Semington A Skittles Team
  <div class="footer-logo">
    <img src="Semington A Logo 5.jpg" alt="Logo">
  </div>
</footer>

<!-- ✅ FIXTURES SCRIPT -->
<script src="fixtures.js"></script>

</body>
</html>
