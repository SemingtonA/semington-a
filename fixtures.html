<header>

      <div class="result-box win">Wins: <span id="winCount">0</span></div>

<!-- ===== MAIN ===== -->
<main>
<div class="content-box">

  <div class="fixtures-header">

      Last updated: —

  <script>
(function () {

  function clean(v) { return v == null ? "" : String(v).trim(); }
  function splitRow(line) { return line.split(","); }

  function toHalfNum(s) {
    if (!s) return NaN;
    s = String(s).replace(/[\u00A0\s]/g, "");
    if (s === "½") return 0.5;
    if (s === "1/2") return 0.5;
    var m = s.match(/^(\d+)(?:½|1\/2)$/);
    if (m) return Number(m[1]) + 0.5;
    var n = Number(s);
    return Number.isFinite(n) ? n : NaN;
  }

  function displayHalf(n) {
    if (!Number.isFinite(n)) return "";
    if (n === 0.5) return "½";
    if (n % 1 === 0.5) return Math.floor(n) + "½";
    return String(n);
  }

  function parseUpdatedAt(v) {
    if (!v) return null;
    var m = v.match(/(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}:\d{2}))?/);
    if (!m) return null;
    return new Date(
      Number(m[3]),
      Number(m[2]) - 1,
      Number(m[1]),
      m[4] ? Number(m[4].split(":")[0]) : 0,
      m[4] ? Number(m[4].split(":")[1]) : 0
    );
  }

  function ordinal(n) {
    return n + (
      n % 10 === 1 && n % 100 !== 11 ? "st" :
      n % 10 === 2 && n % 100 !== 12 ? "nd" :
      n % 10 === 3 && n % 100 !== 13 ? "rd" : "th"
    );
  }

  var tbody = document.getElementById("fixturesBody");
  if (!tbody) return;

  fetch("fixtures_web.csv?v=" + Date.now(), { cache: "no-store" })
    .then(r => r.text())
    .then(text => {

      var lines = text.split(/\r?\n/).map(l => l.trim());
      var headerRow = lines.findIndex(l => l.startsWith("Date:"));
      if (headerRow < 0) return;

      var header = splitRow(lines[headerRow]);
      var idx = n => header.indexOf(n);

      tbody.innerHTML = "";
      var latestUpdated = null;

      for (var i = headerRow + 1; i < lines.length; i++) {
        var row = splitRow(lines[i]);
        if (!row[0]) continue;

        var hp = toHalfNum(row[idx("Home Points")]);
        var ap = toHalfNum(row[idx("Away Points")]);

        var tr = document.createElement("tr");

        tr.dataset.home = row[idx("Home Team")];
        tr.dataset.away = row[idx("Away Team")];
        tr.dataset.homePts = Number.isFinite(hp) ? hp : "";
        tr.dataset.awayPts = Number.isFinite(ap) ? ap : "";
        tr.dataset.comp = row[idx("Match Details")];

        if (/cup/i.test(tr.dataset.comp)) tr.classList.add("cup-match");

        var homeScore = row[3].trim();
        var awayScore = row[7].trim();

        var scoreText = "";
        if (homeScore && awayScore) {
        scoreText = homeScore + "–" + awayScore;
        }


tr.innerHTML = `
  <td>${row[idx("Date:")]}</td>
  <td>${row[idx("Day")]}</td>
  <td>${row[idx("Home Team")]} vs ${row[idx("Away Team")]}</td>
  <td>${scoreText}</td>
  <td class="points">
    ${
      Number.isFinite(hp) && Number.isFinite(ap)
        ? displayHalf(hp) + "–" + displayHalf(ap)
        : ""
    }
  </td>
  <td>${row[idx("Location")]}</td>
  <td>${row[idx("Match Details")]}</td>
  <td>${row[idx("Alley")]}</td>
`;
     
        tbody.appendChild(tr);

        if (row[idx("UpdatedAt")]) latestUpdated = row[idx("UpdatedAt")];
      }

      // STATS
      var w = 0, d = 0, l = 0, pts = 0;

      Array.from(tbody.rows).forEach(tr => {
        if (tr.dataset.comp.toLowerCase().includes("cup")) return;

        var hp = tr.dataset.homePts;
        var ap = tr.dataset.awayPts;
        if (hp === "" || ap === "") return;

        var myPts =
          /semington a/i.test(tr.dataset.home) ? Number(hp) :
          /semington a/i.test(tr.dataset.away) ? Number(ap) : NaN;

        if (!Number.isFinite(myPts)) return;
        pts += myPts;

        if (myPts === 3.5) { d++; tr.classList.add("_draw"); }
        else if (myPts > 3.5) { w++; tr.classList.add("_win"); }
        else { l++; tr.classList.add("_loss"); }
      });

      winCount.textContent = w;
      drawCount.textContent = d;
      lossCount.textContent = l;
      pointsTotal.textContent = pts.toFixed(1);

      var date = parseUpdatedAt(latestUpdated) || new Date();
      lastUpdated.textContent =
        "Last updated: " +
        date.toLocaleDateString("en-GB", { weekday: "short" }) + " " +
        ordinal(date.getDate()) + " " +
        date.toLocaleDateString("en-GB", { month: "long", year: "numeric" }) +
        " " +
        date.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });

    });

})();
</script>
