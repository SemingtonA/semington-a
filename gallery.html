<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery</title>

  <style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: Arial, sans-serif;
    background-color: #f5f0e6;
  }

  /* ===== HEADER ===== */
  header {
    padding: 20px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    margin: 0;
    font-size: 72px;
    text-align: center;
    flex: 1;
  }

  .logo img {
    width: 300px;
    height: auto;
  }

  .nav-buttons {
    margin-top: 15px;
    text-align: center;
  }

  .nav-buttons a {
    display: inline-block;
    margin: 6px;
    padding: 10px 18px;
    background: #000;
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-weight: bold;
  }

  .nav-buttons a:hover {
    background: #163aa3;
  }

  /* ===== MAIN ===== */
  main {
    flex: 1;
    padding: 20px;
    text-align: center;
  }

  .upload-box {
    max-width: 800px;
    margin: 0 auto 20px;
    background: #ffffffcc;
    border-radius: 8px;
    padding: 18px;
    text-align: left;
  }

  .upload-box h2 {
    margin: 0 0 10px;
    text-align: center;
  }

  .upload-box a {
    color: #1f4fd8;
    font-weight: bold;
    text-decoration: none;
  }

  .upload-box a:hover {
    text-decoration: underline;
  }

  .gallery-frame {
    max-width: 1000px;
    width: 100%;
    height: 650px;
    border: none;
    background: #fff;
    border-radius: 8px;
    margin: 0 auto;
    display: block;
  }

  .gallery-copyright {
    max-width: 900px;
    margin: 30px auto 0;
    padding: 12px 16px;
    font-size: 12px;
    color: #555;
    background: #ffffffcc;
    border-radius: 6px;
    text-align: center;
  }

  /* ===== FOOTER ===== */
  footer {
    margin-top: auto;
    text-align: center;
    padding: 16px 20px 22px;
    font-size: 12px;
    color: #555;
  }

  .footer-logo img {
    width: 60px;
    opacity: 0.9;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 900px) {

    .header-top {
      flex-direction: column;
      text-align: center;
    }

    header h1 {
      font-size: 32px;
      margin-top: 10px;
    }

    .logo img {
      width: 150px;
      margin-bottom: 10px;
    }

    .gallery-frame {
      height: 520px;
    }

    .footer-logo img {
      width: 48px;
    }
  }
  </style>
</head>

<body>

<header>
  <div class="header-top">
    <h1>Gallery</h1>

    <div class="logo">
