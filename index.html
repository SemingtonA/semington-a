<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Semington A Skittles Team</title>

<style>
 body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: Arial, sans-serif;
  background-color: #f5f0e6;
}

/* Header */
header {
  position: relative;
  padding: 20px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 48px;
}

/* Logo */
.logo {
  position: absolute;
  top: 20px;
  right: 20px;
}

.logo img {
  width: 300px;
  height: auto;
  object-fit: contain;
}

/* Navigation */
.nav-buttons {
  margin-top: 40px;
}

.nav-buttons a {
  display: inline-block;
  margin: 6px;
  padding: 10px 18px;
  background: #000;
  color: #fff;
  text-decoration: none;
  border-radius: 4px;
  font-weight: bold;
}

.nav-buttons a:hover {
  background: #163aa3;
}

/* Main */
main {
  flex: 1;
  padding: 20px;
  text-align: center;
}

/* Centre image */
.centre-image {
  display: flex;
  justify-content: center;
  margin: 40px 0;
}

.centre-image img {
  width: 600px;
  max-width: 100%;
  height: auto;
}

/* Footer */
footer {
  margin-top: auto;
  text-align: center;
  padding: 16px 20px 22px;
  font-size: 12px;
  color: #555;
}

.footer-logo img {
  width: 60px;
  height: auto;
}
 
/* Mobile */
@media (max-width: 700px) {

  header {
    padding-top: 10px;
  }

  header h1 {
    font-size: 32px;
    margin-top: 10px;
  }

  /* ✅ THIS IS THE KEY FIX */
  .logo {
    position: static;      /* stop overlapping */
    margin-top: 10px;
  }

  .logo img {
    width: 140px;          /* smaller logo */
    height: auto;
  }

  .nav-buttons {
    margin-top: 20px;
  }

  .footer-logo img {
    width: 48px;
  }
 /* Mobile landscape safeguard */
@media (max-height: 500px) {

  .logo {
    position: static;
    margin-bottom: 10px;
  }

  .logo img {
    width: 140px;
  }

  header h1 {
    font-size: 30px;
  }

  .nav-buttons {
    margin-top: 15px;
  }
}
} 
</style>
</head>

<body>

<header>


  <h1>Semington A Skittles Team</h1>

  <div class="logo">
    <img src="Semington A Logo 5.jpg" alt="Semington A Logo">
  </div>
<div class="nav-buttons">
  <a href="/semington-a/index.html">Home</a>
  <a href="/semington-a/fixtures.html">Fixtures & Results</a>
  <a href="/semington-a/match-results.html">Match Results</a>
  <a href="/semington-a/tocatch.html">To Catch</a>
  <a href="/semington-a/gallery.html">Gallery</a>
  <a href="/semington-a/rules.html">Rules</a>
</div>

</header>

<main>

  <!-- ✅ CENTRE IMAGE FIXED -->
  <div class="centre-image">
    <img src="Skittles Clipart 2.jpg" alt="Skittles">
  </div>

  <div class="join-us">
    <h2>Join Us</h2>
    <p>
      We’re always looking for new players, supporters,<br>
      and anyone who can count to nine under pressure.
    </p>
  </div>

</main>

<!-- ✅ COPYRIGHT + SMALL LOGO -->
<footer>
  © Semington A Skittles Team
  <div class="footer-logo">
    <img src="Semington A Logo 5.jpg" alt="Semington A Logo">
  </div>
</footer>



</body>
</html>
