<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Semington A Skittles Team</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: Arial, sans-serif;
  background-color: #f5f0e6;
}

/* Header container */
header {
  position: relative;
  padding: 20px;
  text-align: center;
}
header h1 {
  margin: 0;
  font-size: 48px;
}

/* Visitor counter */
.counter {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #000;
  color: #fff;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1.2;
  white-space: nowrap;
}

/* Top-right logo */
.logo {
  position: absolute;
  top: 20px;
  right: 20px;
}

.logo img {
  width: 300px;
  height: 300px;
  object-fit: contain;
}

/* Buttons */
.nav-buttons {
  margin-top: 20px;
}

.nav-buttons a {
  display: inline-block;
  margin: 6px;
  padding: 10px 18px;
  background: #000;      /* black */
  color: #fff;           /* white text */
  text-decoration: none;
  border-radius: 4px;
  font-weight: bold;
}

.nav-buttons a:hover {
  background: #333;      /* dark grey on hover */
}

.nav-buttons a:hover {
  background: #163aa3;
}

/* Main */
main {
  flex: 1;
  padding: 20px;
  text-align: center;
}

/* Centre image */
.centre-image {
  display: flex;
  justify-content: center;
  margin: 40px 0;
}

.centre-image img {
  width: 600px;
  height: 450px;
  max-width: 100%;
  object-fit: contain;
}

/* Join Us */
.join-us {
  margin-bottom: 20px;
}

/* Footer */
footer {
  margin-top: auto;
  text-align: center;
  padding: 16px 20px 22px;
  font-size: 12px;
  color: #555;
}

.footer-logo {
  margin-top: 8px;
}

.footer-logo img {
  width: 60px;
  height: 60px;
  object-fit: contain;
}
/* Mobile-only adjustments */
@media (max-width: 700px) {

  header h1 {
    font-size: 32px;
  }

  .logo img {
    width: 180px;
    height: auto;
  }

  .centre-image img {
    height: auto;
  }

  .footer-logo img {
    width: 48px;
    height: 48px;
  }

}

  .logo img {
    width: 180px;
    height: 180px;
  }

  .counter {
    position: static;
    margin-bottom: 10px;
  }

  .centre-image img {
    height: auto;
  }

  .footer-logo img {
    width: 48px;
    height: 48px;
  }
}/* Lock visitor counter to top-left */
.counter {
  position: absolute;
  top: 20px;
  left: 20px;
  right: auto;
  width: auto;
  display: inline-block;
  text-align: left;
  white-space: nowrap;
}
</style>
</head>

<body>

<header>


  <h1>Semington A Skittles Team</h1>

  <div class="logo">
    <img src="Semington A Logo 5.jpg" alt="Semington A Logo">
  </div>
<div class="nav-buttons">
  <a href="/semington-a/index.html">Home</a>
  <a href="/semington-a/fixtures.html">Fixtures & Results</a>
  <a href="/semington-a/match-results.html">Match Results</a>
  <a href="/semington-a/tocatch.html">To Catch</a>
  <a href="/semington-a/gallery.html">Gallery</a>
  <a href="/semington-a/rules.html">Rules</a>
</div>

</header>

<main>

  <!-- ✅ CENTRE IMAGE FIXED -->
  <div class="centre-image">
    <img src="Skittles Clipart 2.jpg" alt="Skittles">
  </div>

  <div class="join-us">
    <h2>Join Us</h2>
    <p>
      We’re always looking for new players, supporters,<br>
      and anyone who can count to nine under pressure.
    </p>
  </div>

</main>

<!-- ✅ COPYRIGHT + SMALL LOGO -->
<footer>
  © Semington A Skittles Team
  <div class="footer-logo">
    <img src="Semington A Logo 5.jpg" alt="Semington A Logo">
  </div>
</footer>



</body>
</html>
