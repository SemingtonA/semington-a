<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>To Catch</title>

<style>
body{margin:0;min-height:100vh;display:flex;flex-direction:column;font-family:Arial,sans-serif;background:#f5f0e6}

/* Header */
header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:20px}
.header-center{text-align:center}
.header-center h1{margin:0;font-size:48px}
.header-right{text-align:right}
.header-right img{width:300px;height:auto}

/* Nav (black buttons) */
.nav-buttons{margin-top:12px;text-align:center}
.nav-buttons a{display:inline-block;margin:6px;padding:10px 18px;background:#000;color:#fff;text-decoration:none;border-radius:4px;font-weight:bold}
.nav-buttons a:hover{background:#333}

/* Main */
main{flex:1;padding:20px}
.panel{max-width:1400px;margin:10px auto 14px;background:#ffffffcc;border-radius:8px;padding:12px}
.label{font-size:12px;font-weight:bold;color:#333;margin-bottom:6px}
select{width:100%;padding:8px;border-radius:6px;border:1px solid #ccc}
#status{margin-top:8px;font-size:12px;color:#555}

/* Table */
.table-wrap{max-width:1400px;margin:0 auto;background:#fff;border-radius:8px;padding:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{border-bottom:1px solid #eee;padding:8px;white-space:normal;text-align:center;background:#fafafa}
td{border-bottom:1px solid #eee;padding:8px;white-space:nowrap;text-align:center}
td:nth-child(1),th:nth-child(1){text-align:left}

/* Footer */
footer{margin-top:auto;text-align:center;padding:16px 20px 22px;font-size:12px;color:#555}
.footer-logo img{width:60px;opacity:.9}
</style>
</head>

<body>

<header>
  <div></div>
  <div class="header-center">
    <h1>To Catch</h1>
    <div class="nav-buttons">
      <a href="index.html">Home</a>
      <a href="fixtures.html">Fixtures &amp; Results</a>
      <a href="match-results.html">Match Results</a>
      <a href="ToCatch.html">To Catch</a>
      <a href="gallery.html">Gallery</a>
      <a href="rules.html">Rules</a>
    </div>
  </div>
  <div class="header-right">
    <img src="Semington A Logo 5.jpg" alt="Semington A Logo">
  </div>
</header>

<main>

<div class="panel">
  <div class="label">Filter by League Match (Cup matches excluded)</div>
  <select id="matchSelect">
    <option value="">Latest League Match</option>
  </select>
  <div id="status"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
  <tr>
  <th>Player</th>
<th>Total Match Pins</th>
<th>Games (to date)</th>
<th>Avg</th>
<th>Pins Behind Player Above</th>
</tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</main>

<footer>
  © Semington A Skittles Team
  <div class="footer-logo">
    <img src="Semington A Logo 5.jpg" alt="Logo">
  </div>
</footer>
<script src="tocatch.js"></script>

</body>
</html>
